<!DOCTYPE html>
<html>
<!-- VERSION 4.5.1 - CACHE BUSTER REWRITE -->

<head>
  <base target="_top">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    :root {
      --g50: #ecfdf5;
      --g200: #a7f3d0;
      --g500: #10b981;
      --g600: #059669;
      --g700: #047857;
      --r50: #fef2f2;
      --r600: #dc2626;
      --b50: #eff6ff;
      --b600: #2563eb;
      --o50: #fff7ed;
      --gr50: #f9fafb;
      --gr100: #f3f4f6;
      --gr200: #e5e7eb;
      --gr400: #9ca3af;
      --gr500: #6b7280;
      --gr600: #4b5563;
      --gr700: #374151;
      --gr800: #1f2937;
      --gr900: #111827;
      --sh: 0 2px 8px rgba(0, 0, 0, .06);
      --rad: 12px;
      --rs: 8px
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--gr50);
      color: var(--gr800);
      line-height: 1.5
    }

    .ctrl {
      background: #fff;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 2px solid #fde047;
      position: sticky;
      top: 0;
      z-index: 100
    }

    .ctrl label {
      font-size: 11px;
      font-weight: 600;
      color: var(--gr500);
      text-transform: uppercase;
      letter-spacing: .5px
    }

    .ctrl select {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 6px 10px;
      border: 1.5px solid var(--gr200);
      border-radius: var(--rs);
      background: #fff;
      cursor: pointer
    }

    .btn {
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: var(--rs);
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #fff;
      color: var(--gr700);
      border: 1.5px solid var(--gr200)
    }

    .mla {
      margin-left: auto
    }

    .rc {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px
    }

    .rh {
      background: #fff;
      border-radius: var(--rad);
      box-shadow: var(--sh);
      padding: 20px 24px;
      margin-bottom: 14px;
      border-left: 4px solid var(--g500);
      border: 3px solid #fde047
    }

    .rht {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap
    }

    .rt {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 19px;
      font-weight: 800;
      color: var(--gr900);
      display: flex;
      align-items: center;
      gap: 8px
    }

    .rt .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--g500)
    }

    .rmeta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 4px
    }

    .mt {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 3px 8px;
      border-radius: 16px;
      background: var(--gr100);
      color: var(--gr600)
    }

    .sec {
      background: #fff;
      border-radius: var(--rad);
      box-shadow: var(--sh);
      padding: 18px 20px;
      margin-bottom: 14px
    }

    .sh {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap
    }

    .st {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--gr900)
    }

    .kpi-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px
    }

    .kpi-big {
      border: 1.5px solid var(--gr200);
      border-radius: var(--rs);
      padding: 16px 18px;
      background: #fff;
      box-shadow: var(--sh)
    }

    .kpi-big .kv {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: var(--gr900);
      line-height: 1
    }

    .kpi-sm-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 14px
    }

    .kpi-sm {
      border: 1.5px solid var(--gr200);
      border-radius: var(--rs);
      padding: 12px 14px;
      background: #fff
    }

    .kpi-sm .kv {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: var(--gr900);
      line-height: 1
    }

    .chart-box {
      position: relative;
      height: 170px;
      margin: 8px 0
    }

    .tw {
      overflow-x: auto
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px
    }

    thead th {
      font-size: 8px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--gr400);
      text-align: left;
      padding: 7px 8px;
      border-bottom: 2px solid var(--gr200)
    }

    tbody td {
      padding: 8px;
      border-bottom: 1px solid var(--gr100);
      color: var(--gr700)
    }

    .err-box {
      background: #fef2f2;
      border: 2px solid #ef4444;
      border-radius: var(--rs);
      padding: 16px;
      margin-bottom: 14px;
      font-size: 14px;
      color: #991b1b
    }

    .lo {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, .9);
      z-index: 200;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      gap: 8px
    }

    .lo.on {
      display: flex
    }

    .sp {
      width: 28px;
      height: 28px;
      border: 3px solid var(--gr200);
      border-top-color: var(--g500);
      border-radius: 50%;
      animation: spin .6s linear infinite
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }
  </style>
</head>

<body>
  <div class="ctrl" id="ctrlBar">
    <div style="font-weight:bold;color:#f59e0b;font-size:12px;margin-right:10px">v4.5.1</div>
    <div style="display:flex;align-items:center;gap:10px"><label>AC</label><select id="selAC" onchange="autoGen()">
        <option value="">Conectando...</option>
      </select></div>
    <div style="display:flex;align-items:center;gap:10px"><label>Semana</label><select id="selSem"
        onchange="autoGen()"></select></div>
    <div class="mla"><button class="btn" onclick="exportPDF()">PDF</button></div>
  </div>
  <div class="lo" id="loader">
    <div class="sp"></div><span id="ltxt">Iniciando...</span>
  </div>
  <div class="rc">
    <div id="empty" style="text-align:center;padding:60px 20px;color:var(--gr600)">
      <h3 style="font-size:24px;margin-bottom:10px">Cargando reporte...</h3>
      <p style="font-size:14px">Validando conexión con el backend híbrido</p>
    </div>
    <div id="rpt" style="display:none"></div>
  </div>

  <script>
    // NUCLEAR ERROR HANDLING
    window.onerror = function (msg) { alert("ERROR CRITICO:\n" + msg); return false; };
    console.log("REPORTE V4.5.1 INICIANDO");

    var CFG = null, DIAS = ['Lun', 'Mar', 'Mie', 'Jue', 'Vie', 'Sab', 'Dom'];

    document.addEventListener('DOMContentLoaded', function () {
      slo(true, 'Conectando con la API...');
      // Cache buster for config fetch
      fetch("/api/report?op=config&cb=" + Date.now())
        .then(function (res) {
          if (!res.ok) throw new Error("HTTP " + res.status);
          return res.json();
        })
        .then(function (data) { onCfg(data); })
        .catch(function (e) {
          slo(false);
          eid('empty').innerHTML = '<div class="err-box"><b>Error de Conexión:</b> ' + e.message + '<br><br>Fijate que <b>SHEETS_API_URL</b> esté bien configurada en Vercel.</div>';
        });
    });

    function eid(id) { return document.getElementById(id); }
    function slo(on, txt) { var l = eid('loader'); if (l) l.classList.toggle('on', !!on); if (txt) eid('ltxt').textContent = txt; }

    function onCfg(data) {
      console.log("Config recibida:", data);
      CFG = data || {};
      slo(false);
      var box = eid('empty'); if (!box) return;

      if (CFG.error) {
        box.innerHTML = '<div class="err-box"><b>Error del Servidor:</b> ' + CFG.error + '</div>';
        return;
      }

      var sel = eid('selAC');
      if (sel) {
        sel.innerHTML = '<option value="">-- ELIGE AC --</option>';
        var acs = CFG.acs || [];
        for (var i = 0; i < acs.length; i++) {
          var o = document.createElement('option'); o.value = acs[i]; o.textContent = acs[i]; sel.appendChild(o);
        }
      }
      popSem();
      box.innerHTML = '<div style="background:#fff7ed;padding:20px;border-radius:12px;border:1px solid #fed7aa;color:#9a3412"><b>LISTO (v4.5.1)</b><br>Elegí un AC y una semana para ver los datos.</div>';
    }

    function popSem() {
      var sel = eid('selSem'); if (!sel) return; sel.innerHTML = '';
      var sems = CFG.semanas || [];
      if (sems.length === 0) { sel.innerHTML = '<option>Sin datos</option>'; return; }

      var byY = {};
      for (var i = 0; i < sems.length; i++) {
        var s = sems[i]; if (!s) continue;
        var y = s.y || 'Extra';
        if (!byY[y]) byY[y] = []; byY[y].push(s);
      }

      var ys = Object.keys(byY).sort(function (a, b) { return b - a });
      var now = Date.now(), best = '';
      for (var j = 0; j < ys.length; j++) {
        var g = document.createElement('optgroup'); g.label = ys[j];
        var list = byY[ys[j]];
        for (var k = 0; k < list.length; k++) {
          var s2 = list[k];
          var o = document.createElement('option');
          o.textContent = 'Sem ' + s2.n + ' (' + fD(s2.s) + ' - ' + fD(s2.e) + ')';
          o.value = s2.n + '|' + s2.s + '|' + s2.e + '|' + ys[j];
          g.appendChild(o);
          if (now >= s2.s && now <= (s2.e + 86400000)) best = o.value;
        }
        sel.appendChild(g);
      }
      if (best) sel.value = best;
    }

    function autoGen() {
      var ac = eid('selAC').value, sv = eid('selSem').value; if (!ac || !sv) return;
      var p = sv.split('|');
      var rpt = eid('rpt'); rpt.innerHTML = '<div style="padding:100px;text-align:center;color:#6b7280">Calculando reporte híbrido...</div>';
      rpt.style.display = 'block'; eid('empty').style.display = 'none';

      fetch("/api/report?op=report&ac=" + encodeURIComponent(ac) + "&startTs=" + p[1] + "&endTs=" + p[2] + "&v=" + Date.now())
        .then(function (res) { return res.json(); })
        .then(function (r) {
          if (r.error) throw new Error(r.error);
          render(r, ac, p[0], p[3], p[1], p[2]);
        })
        .catch(function (e) {
          rpt.innerHTML = '<div class="err-box"><b>Error al Generar:</b> ' + e.message + '</div>';
        });
    }

    function fD(v) {
      var d = new Date(v); if (isNaN(d.getTime())) return "??/??";
      return String(d.getDate()).padStart(2, '0') + '/' + String(d.getMonth() + 1).padStart(2, '0') + '/' + d.getFullYear();
    }

    function NN(v) { return (v || 0).toLocaleString('es-AR'); }

    function render(d, ac, sem, anio, sT, eT) {
      var h = '';
      // Aquí va una versión ultralimpia del render 
      h += '<div class="rh"><div class="rht"><div class="rt"><span class="dot"></span>' + ac + ' &mdash; Reporte</div>';
      h += '<div class="rmeta"><span class="mt">Semana ' + sem + ' &middot; ' + anio + '</span><span class="mt">' + fD(+sT) + ' - ' + fD(+eT) + '</span></div></div></div>';

      h += '<div class="kpi-row">';
      h += '<div class="kpi-big"><div style="font-size:10px;text-transform:uppercase;color:#9ca3af">Ofrecidas</div><div class="kv">' + NN(d.cab) + '</div><div style="font-size:11px;color:#6b7280">' + (d.trop || 0) + ' tropas &middot; ' + (d.ccc || '0%') + ' CCC</div><div style="font-size:11px;margin-top:5px">' + dc((d.cab || 0) - (d.pCab || 0)) + '</div></div>';
      h += '<div class="kpi-big"><div style="font-size:10px;text-transform:uppercase;color:#9ca3af">Concretadas</div><div class="kv">' + NN((d.cabV || 0) + (d.cabC || 0)) + '</div><div style="font-size:11px;color:#6b7280">' + (d.trConc || 0) + ' ops &middot; ' + NN(d.cabV) + ' venta / ' + NN(d.cabC) + ' compra</div><div style="font-size:11px;margin-top:5px">' + dc(((d.cabV || 0) + (d.cabC || 0)) - (d.pConc || 0)) + '</div></div>';
      h += '</div>';

      h += '<div class="kpi-sm-row">';
      h += ksm('Soc. Gest', d.tSG || 0, (d.com || 0) + ' com / ' + (d.age || 0) + ' age');
      h += ksm('Cargas', d.carg || 0, (d.cargProp || 0) + ' prop / ' + (d.cargAjen || 0) + ' ajen');
      h += ksm('SACs', (d.sacs || []).length, 'Pedidos credito');
      h += ksm('Remates', d.rem || 0, 'Participaciones');
      h += ksm('Nuevas', d.nuevas || 0, 'Leads cargados');
      h += '</div>';

      // Gráfico Simplificado (Placeholder si falla Canvas)
      h += '<div class="sec"><div class="st">Actividad Diaria</div><div class="chart-box"><canvas id="chartD"></canvas></div></div>';

      // Tabla Negocios
      h += '<div class="sec"><div class="st">Top 5 Operaciones</div><div class="tw"><table><thead><tr><th>ID</th><th>Soc. Vendedora</th><th>Fecha</th><th>Q</th><th>Cat</th></tr></thead><tbody>';
      var tops = d.top5 || [];
      for (var i = 0; i < tops.length; i++) {
        var r = tops[i].d;
        h += '<tr><td>' + r[0] + '</td><td>' + r[2] + '</td><td>' + r[6] + '</td><td style="font-weight:bold">' + NN(r[7]) + '</td><td>' + r[10] + '</td></tr>';
      }
      if (tops.length === 0) h += '<tr><td colspan="5" style="text-align:center;padding:10px">Sin operaciones</td></tr>';
      h += '</tbody></table></div></div>';

      eid('rpt').innerHTML = h;
      draw(d.dT || [0, 0, 0, 0, 0, 0, 0]);
    }

    function ksm(l, v, m) { return '<div class="kpi-sm"><div style="font-size:8px;font-weight:700;color:#9ca3af;text-transform:uppercase">' + l + '</div><div class="kv">' + v + '</div><div style="font-size:9px;color:#6b7280">' + m + '</div></div>'; }
    function dc(v) { if (v > 0) return '<span style="color:#059669;font-weight:700">▲ ' + v + '</span>'; if (v < 0) return '<span style="color:#dc2626;font-weight:700">▼ ' + Math.abs(v) + '</span>'; return '='; }

    function draw(tr) {
      var cv = eid('chartD'); if (!cv) return; var ctx = cv.getContext('2d');
      var W = cv.parentElement.offsetWidth, H = cv.parentElement.offsetHeight; cv.width = W; cv.height = H;
      var mx = 1; for (var i = 0; i < 7; i++) if (tr[i] > mx) mx = tr[i]; mx *= 1.2;
      var bw = (W - 40) / 7;
      ctx.fillStyle = '#10b981';
      for (var i = 0; i < 7; i++) {
        var bh = (tr[i] / mx) * (H - 20);
        ctx.fillRect(20 + i * bw + bw * 0.2, H - bh, bw * 0.6, bh);
        ctx.fillStyle = '#9ca3af'; ctx.font = '10px sans-serif'; ctx.fillText(DIAS[i], 20 + i * bw + bw * 0.2, H - 2);
        ctx.fillStyle = '#10b981';
      }
    }

    function exportPDF() {
      var el = eid('rpt'); if (!el || !el.innerHTML) return;
      var opt = { margin: 5, filename: 'Reporte.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
      html2pdf().from(el).set(opt).save();
    }
  </script>
</body>

</html>
